<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetroX VPN - Client Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #060b13;
            --card-bg: #0b1424;
            --accent-blue: #00d2ff;
            --accent-green: #00ff88;
            --accent-orange: #ffaa00;
            --text-main: #ffffff;
            --text-muted: #64748b;
            --border-color: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Header Styles */
        .header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .brand-name {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #00d2ff, #0066ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            color: var(--accent-green);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid rgba(0, 255, 136, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent-green);
        }

        .btn-home {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-home:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
        }

        /* Main Container */
        .dashboard-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Profile Card */
        .profile-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 25px;
            position: relative;
            overflow: hidden;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, var(--accent-blue), #0066ff);
        }

        .avatar-circle {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #0b1e36, #1e3a5f);
            border: 2px solid var(--accent-blue);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: var(--accent-blue);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .profile-info h2 {
            font-size: 22px;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .profile-info p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .role-badge {
            position: absolute;
            right: 30px;
            background: linear-gradient(to right, #0088ff, #00c2ff);
            color: white;
            padding: 6px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(0, 136, 255, 0.3);
        }

        /* Notice Banner */
        .notice-banner {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.15);
            padding: 15px 20px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--accent-green);
            font-size: 14px;
            font-weight: 600;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .stat-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 210, 255, 0.3);
        }

        .icon-wrapper {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .stat-card:nth-child(1) .icon-wrapper { background: rgba(0, 210, 255, 0.1); color: var(--accent-blue); }
        .stat-card:nth-child(2) .icon-wrapper { background: rgba(255, 170, 0, 0.1); color: var(--accent-orange); }
        .stat-card:nth-child(3) .icon-wrapper { background: rgba(0, 255, 136, 0.1); color: var(--accent-green); }
        .stat-card:nth-child(4) .icon-wrapper { background: rgba(0, 136, 255, 0.1); color: #0088ff; }

        .stat-label {
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .stat-card:nth-child(1) .stat-value { color: var(--accent-blue); }
        .stat-card:nth-child(2) .stat-value { color: var(--accent-orange); }
        .stat-card:nth-child(3) .stat-value { color: var(--accent-green); }
        .stat-card:nth-child(4) .stat-value { color: #00d2ff; }

        /* Action Buttons */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 10px;
        }

        .btn {
            padding: 16px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-refresh {
            background-color: #0f1a2c;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-refresh:hover {
            background-color: #1e293b;
            border-color: var(--text-muted);
        }

        .btn-support {
            background: linear-gradient(to right, #0066ff, #00d2ff);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
        }

        .btn-support:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 102, 255, 0.4);
        }

        .btn-upgrade {
            background: linear-gradient(to right, #ff9900, #ffcc00);
            color: #060b13;
            box-shadow: 0 4px 15px rgba(255, 153, 0, 0.3);
        }

        .btn-upgrade:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 153, 0, 0.4);
        }

        .btn-logout {
            background-color: rgba(255, 68, 68, 0.05);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.15);
        }

        .btn-logout:hover {
            background-color: rgba(255, 68, 68, 0.1);
            border-color: #ff4444;
        }

        /* Footer */
        .footer {
            margin-top: auto;
            padding: 40px 0 20px 0;
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .profile-card {
                flex-direction: column;
                text-align: center;
                padding: 20px;
            }
            .role-badge {
                position: static;
                margin-top: 10px;
            }
            .actions-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-section">
            <img src="https://via.placeholder.com/45" alt="NetroX Logo" class="logo-img">
            <span class="brand-name">NETROX VPN</span>
        </div>
        <div class="nav-buttons">
            <div class="status-badge">
                <div class="status-dot"></div>
                Online
            </div>
            <a href="#" class="btn-home"><i class="fa-solid fa-arrow-left"></i> Home</a>
        </div>
    </div>

    <div class="dashboard-container">
        <div class="profile-card">
            <div class="avatar-circle" id="user-avatar">K</div>
            <div class="profile-info">
                <p style="color: var(--accent-blue); font-size: 12px; font-weight: 700; margin-bottom: 4px;">Good Afternoon ⛅</p>
                <h2 id="client-name">Kalpika Champathi</h2>
                <p id="client-email">kalpikachampathi@gmail.com</p>
            </div>
            <div class="role-badge"><i class="fa-solid fa-crown"></i> CLIENT</div>
        </div>

        <div class="notice-banner">
            <i class="fa-solid fa-circle-info"></i>
            <span>Upgrade to Paid for full dashboard!</span>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="icon-wrapper"><i class="fa-solid fa-chart-simple"></i></div>
                <span class="stat-label">Used</span>
                <span class="stat-value" id="stat-used">N/A</span>
            </div>
            <div class="stat-card">
                <div class="icon-wrapper"><i class="fa-solid fa-calendar-days"></i></div>
                <span class="stat-label">Expires</span>
                <span class="stat-value" id="stat-expires">N/A</span>
            </div>
            <div class="stat-card">
                <div class="icon-wrapper"><i class="fa-solid fa-hourglass-half"></i></div>
                <span class="stat-label">Days</span>
                <span class="stat-value" id="stat-days">N/A</span>
            </div>
            <div class="stat-card">
                <div class="icon-wrapper"><i class="fa-solid fa-circle-check"></i></div>
                <span class="stat-label">Status</span>
                <span class="stat-value" id="stat-status">Client</span>
            </div>
        </div>

        <div class="actions-grid">
            <button class="btn btn-refresh" onclick="updateDashboard()"><i class="fa-solid fa-rotate"></i> Refresh</button>
            <a href="#" class="btn btn-support"><i class="fa-brands fa-whatsapp"></i> Support</a>
            <a href="#" class="btn btn-upgrade"><i class="fa-solid fa-bolt"></i> Upgrade</a>
            <button class="btn btn-logout" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
        </div>
    </div>

    <div class="footer">
        © 2025 NetroX VPN | Developed by KMAX ⚡
    </div>

    <script>
        // පේජ් එක ලෝඩ් වෙද්දීම මේක Auto රන් වෙනවා
        window.onload = function() {
            updateDashboard();
        };

async function updateDashboard() {
    const currentEmail = document.getElementById("client-email").innerText.trim();
    
    if(currentEmail) {
        document.getElementById("user-avatar").innerText = currentEmail.charAt(0).toUpperCase();
    }

    document.getElementById("stat-used").innerText = "Loading...";
    document.getElementById("stat-expires").innerText = "Loading...";
    document.getElementById("stat-days").innerText = "Loading...";

    const subUrl = `https://vpn.netrox.site:2096/sub/${currentEmail}`;

    // 🌟 මෙන්න මෙතනදී AllOrigins CORS Proxy එක හරහා ලින්ක් එක Pass කරනවා 🌟
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(subUrl)}`;

    try {
        // අපි දැන් කතා කරන්නේ Proxy ලින්ක් එකටයි
        const response = await fetch(proxyUrl);
        const data = await response.json(); // AllOrigins එකෙන් ඩේටා එවන්නේ JSON එකක් විදිහට

        // JSON එක ඇතුලේ තියෙන සැබෑ 3X-UI Headers ටික මෙතනින් කියවනවා
        const profile = data.headers?.profile || data.headers?.Profile;

        if (profile) {
            const params = new URLSearchParams(profile.replace(/;\s*/g, '&'));
            
            const upload = parseInt(params.get('upload') || 0);
            const download = parseInt(params.get('download') || 0);
            const totalLimit = parseInt(params.get('total') || 0);
            const expiry = parseInt(params.get('expire') || 0);

            const usedGB = ((upload + download) / (1024 ** 3)).toFixed(2);
            
            document.getElementById("stat-used").innerText = `${usedGB} GB`;
            
            if (expiry > 0) {
                const todayTimestamp = Math.floor(new Date().getTime() / 1000);
                const daysLeft = Math.floor((expiry - todayTimestamp) / 86400);
                
                const expiryDate = new Date(expiry * 1000);
                document.getElementById("stat-expires").innerText = expiryDate.toLocaleDateString();
                document.getElementById("stat-days").innerText = daysLeft > 0 ? `${daysLeft} Days` : "Expired";
            } else {
                document.getElementById("stat-expires").innerText = "No Limit";
                document.getElementById("stat-days").innerText = "Lifetime";
            }

            document.getElementById("stat-status").innerText = "Active";
            document.getElementById("stat-status").style.color = "var(--accent-green)";

        } else {
            setErrorStates("No Header");
        }
    } catch (err) {
        console.error("Dashboard Fetch Error:", err);
        setErrorStates("Error");
    }
}

        function setErrorStates(reason) {
            document.getElementById("stat-used").innerText = "N/A";
            document.getElementById("stat-expires").innerText = "N/A";
            document.getElementById("stat-days").innerText = "N/A";
            document.getElementById("stat-status").innerText = "Error";
            document.getElementById("stat-status").style.color = "#ff4444";
        }

        function logout() {
            alert("Logging out...");
            // ඔයාගේ Logout පේජ් එකට මෙතනින් යවන්න:
            // window.location.href = "index.html";
        }
    </script>
</body>
</html>
