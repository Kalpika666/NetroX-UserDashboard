<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetroX VPN – Login & Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://i.ibb.co/Kj3NdKvH/Whats-App-Image-2026-04-21-at-7-52-57-PM-1.jpg" type="image/jpeg">

    <style>
        :root {
            --cyan:#00d2ff; --blue:#3a7bd5; --gold:#ffd700; --orange:#ff8c00;
            --green:#34c759; --red:#ff3b30; --bg:#050510;
            --card:rgba(255,255,255,0.02); --border:rgba(255,255,255,0.05);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background:var(--bg); color:#fff; overflow-x:hidden; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        #particles-js { position:fixed; width:100%; height:100%; z-index:-1; }
        .container { width:100%; max-width:450px; padding:20px; z-index:1; transition:all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card { background:var(--card); backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:30px; padding:40px; box-shadow:0 25px 50px rgba(0,0,0,0.5); position:relative; overflow:hidden; }
        .glass-card::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle, rgba(0,210,255,0.05) 0%, transparent 70%); z-index:-1; }
        .logo-area { text-align:center; margin-bottom:40px; }
        .logo-area img { width:80px; height:80px; border-radius:20px; margin-bottom:15px; box-shadow:0 0 30px rgba(0,210,255,0.3); border:2px solid var(--cyan); }
        .logo-area h1 { font-size:28px; font-weight:800; letter-spacing:-1px; background:linear-gradient(to right, #fff, var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .input-group { margin-bottom:20px; position:relative; }
        .input-group i { position:absolute; left:20px; top:50%; transform:translateY(-50%); color:rgba(255,255,255,0.3); transition:0.3s; }
        .input-group input { width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:15px; padding:15px 15px 15px 50px; color:#fff; font-size:15px; transition:0.3s; }
        .input-group input:focus { border-color:var(--cyan); background:rgba(0,210,255,0.05); outline:none; }
        .input-group input:focus + i { color:var(--cyan); }
        .login-btn { width:100%; padding:16px; border-radius:15px; border:none; background:linear-gradient(45deg, var(--blue), var(--cyan)); color:#fff; font-weight:700; font-size:16px; cursor:pointer; transition:0.4s; box-shadow:0 10px 20px rgba(0,210,255,0.2); }
        .login-btn:hover { transform:translateY(-3px); box-shadow:0 15px 30px rgba(0,210,255,0.4); filter:brightness(1.1); }
        .login-btn:disabled { opacity:0.6; cursor:not-allowed; }
        
        #dashboard { display:none; max-width:800px; }
        .dash-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        .user-info { display:flex; align-items:center; gap:15px; }
        .user-avatar { width:50px; height:50px; border-radius:15px; background:linear-gradient(45deg, var(--blue), var(--cyan)); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:20px; }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:30px; }
        .stat-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:25px; padding:25px; transition:0.3s; }
        .stat-card:hover { background:rgba(255,255,255,0.05); transform:translateY(-5px); }
        .stat-label { color:rgba(255,255,255,0.5); font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; display:block; }
        .stat-value { font-family:'JetBrains Mono', monospace; font-size:24px; font-weight:700; color:var(--cyan); }
        .status-badge { display:inline-flex; align-items:center; gap:8px; padding:8px 16px; border-radius:100px; background:rgba(52,199,89,0.1); color:var(--green); font-size:13px; font-weight:700; }
        .status-dot { width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 10px var(--green); }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="container" id="login-box">
        <div class="glass-card">
            <div class="logo-area">
                <img src="https://i.ibb.co/Kj3NdKvH/Whats-App-Image-2026-04-21-at-7-52-57-PM-1.jpg" alt="NetroX">
                <h1>NetroX Dashboard</h1>
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="text" id="username" placeholder="Client Email Address">
            </div>
            <button class="login-btn" onclick="checkClient()">Access Dashboard</button>
        </div>
    </div>

    <div class="container" id="dashboard">
        <div class="glass-card">
            <div class="dash-header">
                <div class="user-info">
                    <div class="user-avatar" id="userInitial">U</div>
                    <div>
                        <h2 id="displayUser" style="font-size:18px;">Client</h2>
                        <div class="status-badge"><span class="status-dot"></span> <span id="clientStatus">Active</span></div>
                    </div>
                </div>
                <button onclick="location.reload()" style="background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer;"><i class="fas fa-sign-out-alt"></i></button>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label"><i class="fas fa-chart-line"></i> Data Used</span>
                    <div class="stat-value" id="usedData">0.00 GB</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label"><i class="fas fa-database"></i> Total Data</span>
                    <div class="stat-value" id="totalData">0.00 GB</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label"><i class="fas fa-calendar-alt"></i> Expiry Date</span>
                    <div class="stat-value" id="expiryDate">--/--/----</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label"><i class="fas fa-shield-alt"></i> Billing</span>
                    <div class="stat-value" id="paidStatus" style="color:var(--green)">Paid</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        async function checkClient() {
            const userEmail = document.getElementById('username').value.trim();
            const loginBtn = document.querySelector('.login-btn');
            
            if (!userEmail) {
                alert("Please enter your client email.");
                return;
            }

            loginBtn.innerText = "Connecting...";
            loginBtn.disabled = true;

            try {
                // මෙතැන YOUR_VPS_IP වෙනුවට ඔබේ IP එක ඇතුළත් කරන්න
                const response = await fetch('http://YOUR_VPS_IP/api.php');
                const data = await response.json();

                if (data && data.obj) {
                    let foundUser = null;

                    data.obj.forEach(inbound => {
                        const settings = JSON.parse(inbound.settings);
                        if (settings.clients) {
                            const client = settings.clients.find(c => c.email === userEmail);
                            if (client) foundUser = client;
                        }
                    });

                    if (foundUser) {
                        document.getElementById('login-box').style.display = 'none';
                        document.getElementById('dashboard').style.display = 'block';
                        document.getElementById('displayUser').innerText = userEmail.split('@')[0];
                        document.getElementById('userInitial').innerText = userEmail[0].toUpperCase();

                        const used = ((foundUser.up + foundUser.down) / (1024 ** 3)).toFixed(2);
                        const total = (foundUser.total / (1024 ** 3)).toFixed(2);
                        
                        countUp('usedData', 0, parseFloat(used), 1500, ' GB');
                        countUp('totalData', 0, parseFloat(total), 1500, ' GB');

                        if (foundUser.expiryTime > 0) {
                            const expiry = new Date(foundUser.expiryTime).toLocaleDateString();
                            document.getElementById('expiryDate').innerText = expiry;
                        } else {
                            document.getElementById('expiryDate').innerText = "Unlimited";
                        }
                    } else {
                        alert("Client Email not found!");
                    }
                }
            } catch (error) {
                alert("Connection Error! Check your VPS API.");
            } finally {
                loginBtn.innerText = "Access Dashboard";
                loginBtn.disabled = false;
            }
        }

        function countUp(id, s, e, d, x) {
            const el = document.getElementById(id);
            const r = e - s;
            const st = performance.now();
            function u(t) {
                const p = Math.min((t - st) / d, 1);
                const ea = 1 - Math.pow(1 - p, 3);
                el.textContent = (s + r * ea).toFixed(2) + x;
                if (p < 1) requestAnimationFrame(u);
            }
            requestAnimationFrame(u);
        }

        particlesJS('particles-js', {
            particles: {
                number: { value: 60, density: { enable: true, value_area: 800 } },
                color: { value: '#00d2ff' },
                shape: { type: 'circle' },
                opacity: { value: 0.2, random: true },
                size: { value: 2, random: true },
                line_linked: { enable: true, distance: 150, color: '#00d2ff', opacity: 0.1, width: 1 },
                move: { enable: true, speed: 1 }
            },
            interactivity: { events: { onhover: { enable: true, mode: 'grab' } } },
            retina_detect: true
        });
    </script>
</body>
</html>
