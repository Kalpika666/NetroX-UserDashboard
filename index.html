<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetroX VPN – Login & Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="https://i.ibb.co/Kj3NdKvH/Whats-App-Image-2026-04-21-at-7-52-57-PM-1.jpg" type="image/jpeg">

    <style>
        :root {
            --cyan:#00d2ff; --blue:#3a7bd5; --gold:#ffd700; --orange:#ff8c00;
            --green:#34c759; --red:#ff3b30; --bg:#050510;
            --card:rgba(255,255,255,0.02); --border:rgba(255,255,255,0.05);
            --glow:rgba(0,210,255,0.15);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body { background:var(--bg); color:#fff; min-height:100vh; display:flex; justify-content:center; align-items:center; overflow-x:hidden; position:relative; }
        #particles-js { position:absolute; width:100%; height:100%; z-index:1; }
        .wrapper { position:relative; z-index:10; width:100%; max-width:450px; padding:20px; transition:max-width 0.5s cubic-bezier(0.4,0,0.2,1); }
        .wrapper.dashboard-mode { max-width:900px; }
        .container { background:rgba(10,10,25,0.7); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid var(--border); border-radius:24px; padding:40px; box-shadow:0 20px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1); width:100%; position:relative; overflow:hidden; }
        .container::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle, var(--glow) 0%, transparent 70%); pointer-events:none; z-index:0; }
        .inner-content { position:relative; z-index:2; }
        .logo-area { text-align:center; margin-bottom:35px; }
        .logo-box { width:64px; height:64px; background:linear-gradient(135deg, var(--cyan), var(--blue)); border-radius:16px; margin:0 auto 15px; display:flex; justify-content:center; align-items:center; font-size:28px; font-weight:900; color:#fff; box-shadow:0 0 30px rgba(0,210,255,0.3); border:1px solid rgba(255,255,255,0.2); }
        .logo-box img { width:100%; height:100%; border-radius:16px; object-fit:cover; }
        .logo-area h1 { font-size:24px; font-weight:800; letter-spacing:1px; margin-bottom:5px; background:linear-gradient(to right, #fff, rgba(255,255,255,0.7)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .logo-area p { font-size:13px; color:rgba(255,255,255,0.4); font-weight:400; }
        .tabs { display:flex; background:rgba(0,0,0,0.3); padding:6px; border-radius:14px; border:1px solid var(--border); margin-bottom:30px; }
        .tab-btn { flex:1; padding:12px; background:none; border:none; color:rgba(255,255,255,0.4); font-size:14px; font-weight:600; cursor:pointer; border-radius:10px; transition:all 0.3s; display:flex; justify-content:center; align-items:center; gap:8px; }
        .tab-btn.active { background:linear-gradient(135deg, rgba(0,210,255,0.1), rgba(58,123,213,0.1)); color:var(--cyan); border:1px solid rgba(0,210,255,0.2); font-weight:700; box-shadow:0 4px 15px rgba(0,0,0,0.2); }
        .tab-content { display:none; }
        .tab-content.active { display:block; animation:fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .form-group { margin-bottom:22px; position:relative; }
        .form-group label { display:block; font-size:12px; font-weight:600; color:rgba(255,255,255,0.5); margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
        .input-wrapper { position:relative; display:flex; align-items:center; }
        .input-wrapper i { position:absolute; left:16px; color:rgba(255,255,255,0.3); font-size:16px; transition:color 0.3s; }
        .input-wrapper input { width:100%; padding:16px 16px 16px 48px; background:rgba(0,0,0,0.2); border:1px solid var(--border); border-radius:14px; color:#fff; font-size:14px; font-weight:500; transition:all 0.3s; }
        .input-wrapper input:focus { border-color:var(--cyan); box-shadow:0 0 15px rgba(0,210,255,0.1); background:rgba(0,0,0,0.4); outline:none; }
        .input-wrapper input:focus + i { color:var(--cyan); }
        .toggle-password { position:absolute; right:16px; background:none; border:none; color:rgba(255,255,255,0.3); cursor:pointer; font-size:16px; transition:color 0.3s; padding:0; height:100%; display:flex; align-items:center; }
        .toggle-password:hover { color:#fff; }
        .btn-submit { width:100%; padding:16px; background:linear-gradient(135deg, var(--cyan), var(--blue)); border:none; border-radius:14px; color:#fff; font-size:15px; font-weight:700; cursor:pointer; transition:all 0.3s; display:flex; justify-content:center; align-items:center; gap:10px; box-shadow:0 8px 25px rgba(0,210,255,0.2); margin-top:10px; border:1px solid rgba(255,255,255,0.1); }
        .btn-submit:hover { transform:translateY(-2px); box-shadow:0 12px 30px rgba(0,210,255,0.3); filter:brightness(1.1); }
        .btn-submit:active { transform:translateY(0); }
        .msg { font-size:13px; margin-top:15px; text-align:center; font-weight:500; display:none; padding:10px; border-radius:10px; }
        .msg.err { display:block; background:rgba(255,59,48,0.1); border:1px solid rgba(255,59,48,0.2); color:var(--red); animation:shake 0.4s; }
        .msg.ok { display:block; background:rgba(52,199,89,0.1); border:1px solid rgba(52,199,89,0.2); color:var(--green); }
        @keyframes shake { 0%,100%{transform:translateX(0);} 20%,60%{transform:translateX(-6px);} 40%,80%{transform:translateX(6px);} }
        
        /* Dashboard Styles */
        .dashboard { display:none; }
        .dashboard.active { display:block; animation:fadeIn 0.6s cubic-bezier(0.4,0,0.2,1); }
        .dash-header { display:flex; justify-content:between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:25px; margin-bottom:30px; gap:20px; }
        .user-profile { display:flex; align-items:center; gap:16px; flex:1; }
        .user-avatar { width:52px; height:52px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:14px; display:flex; justify-content:center; align-items:center; font-size:20px; font-weight:800; color:var(--cyan); box-shadow:0 4px 15px rgba(0,0,0,0.2); }
        .user-meta h3 { font-size:18px; font-weight:700; margin-bottom:4px; letter-spacing:0.5px; }
        .user-meta p { font-size:13px; color:rgba(255,255,255,0.4); font-weight:500; }
        .dash-actions { display:flex; gap:12px; }
        .btn-icon { width:42px; height:42px; background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:12px; color:rgba(255,255,255,0.6); display:flex; justify-content:center; align-items:center; cursor:pointer; transition:all 0.3s; font-size:16px; }
        .btn-icon:hover { background:rgba(255,255,255,0.05); color:#fff; border-color:rgba(255,255,255,0.2); transform:translateY(-2px); }
        .btn-icon.logout-btn:hover { color:var(--red); border-color:rgba(255,59,48,0.2); background:rgba(255,59,48,0.05); }
        
        .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:20px; margin-bottom:30px; }
        .stat-card { background:rgba(255,255,255,0.01); border:1px solid var(--border); border-radius:18px; padding:22px; position:relative; overflow:hidden; display:flex; flex-direction:column; gap:14px; transition:all 0.3s; }
        .stat-card:hover { border-color:rgba(255,255,255,0.1); transform:translateY(-3px); background:rgba(255,255,255,0.02); }
        .stat-card::after { content:''; position:absolute; bottom:0; left:0; width:100%; height:3px; background:transparent; }
        .stat-card.cyan::after { background:var(--cyan); box-shadow:0 0 10px var(--cyan); }
        .stat-card.orange::after { background:var(--orange); box-shadow:0 0 10px var(--orange); }
        .stat-card.green::after { background:var(--green); box-shadow:0 0 10px var(--green); }
        .stat-card.blue::after { background:var(--blue); box-shadow:0 0 10px var(--blue); }
        
        .stat-top { display:flex; justify-content:between; align-items:center; width:100%; }
        .stat-title { font-size:11px; font-weight:700; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; }
        .stat-icon { width:32px; height:32px; border-radius:8px; display:flex; justify-content:center; align-items:center; font-size:14px; }
        .stat-card.cyan .stat-icon { background:rgba(0,210,255,0.05); color:var(--cyan); }
        .stat-card.orange .stat-icon { background:rgba(255,140,0,0.05); color:var(--orange); }
        .stat-card.green .stat-icon { background:rgba(52,199,89,0.05); color:var(--green); }
        .stat-card.blue .stat-icon { background:rgba(58,123,213,0.05); color:var(--blue); }
        
        .stat-num { font-size:22px; font-weight:800; font-family:'JetBrains Mono',monospace; letter-spacing:-0.5px; margin-top:5px; }
        
        @media(max-width:768px){
            .grid-4 { grid-template-columns:repeat(2,1fr); gap:15px; }
            .dash-header { flex-direction:column; align-items:flex-start; }
            .dash-actions { width:100%; justify-content:flex-end; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="wrapper" id="mainWrapper">
        <div class="container">
            <div class="inner-content">
                
                <div class="portal" id="portalPanel">
                    <div class="logo-area">
                        <div class="logo-box">
                            <img src="https://i.ibb.co/Kj3NdKvH/Whats-App-Image-2026-04-21-at-7-52-57-PM-1.jpg" alt="NetroX Logo">
                        </div>
                        <h1>NETROX VPN</h1>
                        <p>Client Management Portal</p>
                    </div>

                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchTab('client', this)"><i class="fa-solid fa-user"></i> Client Panel</button>
                        <button class="tab-btn" onclick="switchTab('paid', this)"><i class="fa-solid fa-bolt"></i> Paid Login</button>
                    </div>

                    <div class="tab-content active" id="client-tab">
                        <div class="form-group">
                            <label>Registered Email</label>
                            <div class="input-wrapper">
                                <input type="email" id="clientEmail" placeholder="Enter your email address">
                                <i class="fa-solid fa-envelope"></i>
                            </div>
                        </div>
                        <button class="btn-submit" onclick="handleClientSubmit()"><i class="fa-solid fa-right-to-bracket"></i> View Dashboard</button>
                        <div class="msg" id="clientStatus"></div>
                    </div>

                    <div class="tab-content" id="paid-tab">
                        <div class="form-group">
                            <label>Username</label>
                            <div class="input-wrapper">
                                <input type="text" id="paidUser" placeholder="Enter username">
                                <i class="fa-solid fa-user-shield"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <div class="input-wrapper">
                                <input type="password" id="paidPass" placeholder="Enter password">
                                <i class="fa-solid fa-lock"></i>
                                <button class="toggle-password" onclick="togglePass('paidPass', this)"><i class="fa-solid fa-eye"></i></button>
                            </div>
                        </div>
                        <button class="btn-submit" onclick="handlePaidSubmit()"><i class="fa-solid fa-shield-halved"></i> Authenticate</button>
                        <div class="msg" id="paidStatus"></div>
                    </div>
                </div>

                <div class="dashboard" id="dashPanel">
                    <div class="dash-header">
                        <div class="user-profile">
                            <div class="user-avatar" id="dashAvatar">U</div>
                            <div class="user-meta">
                                <h3 id="dashName">Loading...</h3>
                                <p id="dashEmail">user@netrox.site</p>
                            </div>
                        </div>
                        <div class="dash-actions">
                            <button class="btn-icon" title="Refresh Data" onclick="fetchDashboardData()"><i class="fa-solid fa-arrow-rotate-right"></i></button>
                            <button class="btn-icon logout-btn" title="Logout" onclick="logout()"><i class="fa-solid fa-power-off"></i></button>
                        </div>
                    </div>

                    <div class="grid-4">
                        <div class="stat-card cyan">
                            <div class="stat-top">
                                <span class="stat-title">Used</span>
                                <div class="stat-icon"><i class="fa-solid fa-chart-line"></i></div>
                            </div>
                            <div class="stat-num" id="statUsed">0.00 GB</div>
                        </div>
                        <div class="stat-card orange">
                            <div class="stat-top">
                                <span class="stat-title">Expires</span>
                                <div class="stat-icon"><i class="fa-solid fa-calendar-xmark"></i></div>
                            </div>
                            <div class="stat-num" id="statExpires">N/A</div>
                        </div>
                        <div class="stat-card green">
                            <div class="stat-top">
                                <span class="stat-title">Days</span>
                                <div class="stat-icon"><i class="fa-solid fa-hourglass-half"></i></div>
                            </div>
                            <div class="stat-num" id="statDays">0</div>
                        </div>
                        <div class="stat-card blue">
                            <div class="stat-top">
                                <span class="stat-title">Status</span>
                                <div class="stat-icon"><i class="fa-solid fa-circle-check"></i></div>
                            </div>
                            <div class="stat-num" id="statStatus" style="font-size:18px;">Active</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // particles.js configuration
        particlesJS('particles-js', {
            particles: {
                number: { value: 40, density: { enable: true, value_area: 800 } },
                color: { value: '#00d2ff' },
                shape: { type: 'circle' },
                opacity: { value: 0.15, random: true },
                size: { value: 2, random: true },
                line_linked: { enable: true, distance: 150, color: '#00d2ff', opacity: 0.05, width: 1 },
                move: { enable: true, speed: 1, direction: 'none', random: true, straight: false, out_mode: 'out' }
            }
        });

        function clr(id){ const el=document.getElementById(id); el.className='msg'; el.textContent=''; }
        
        function switchTab(t,el){
            document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(t+'-tab').add?document.getElementById(t+'-tab').add:document.getElementById(t+'-tab').classList.add('active');
            clr('clientStatus'); clr('paidStatus');
        }

        function togglePass(id,el){
            const i=document.getElementById(id); const ic=el.querySelector('i');
            if(i.type==='password'){ i.type='text'; ic.classList.replace('fa-eye','fa-eye-slash'); }
            else{ i.type='password'; ic.classList.replace('fa-eye-slash','fa-eye'); }
        }

        // Handle Client Form Submit
        function handleClientSubmit() {
            const email = document.getElementById("clientEmail").value.trim();
            const statusEl = document.getElementById("clientStatus");
            
            if(!email) {
                statusEl.className = "msg err";
                statusEl.textContent = "Please enter a valid email address.";
                return;
            }

            statusEl.className = "msg ok";
            statusEl.textContent = "Connecting to Netrox Node...";

            // 1. Dashboard එකට Email එක සහ නම සෙට් කරනවා
            document.getElementById("dashEmail").textContent = email;
            
            // Name එක විදිහට Email එකේ කෑල්ලක් දානවා ලස්සන වෙන්න
            const namePart = email.split('@')[0];
            document.getElementById("dashName").textContent = namePart.charAt(0).toUpperCase() + namePart.slice(1);
            document.getElementById("dashAvatar").textContent = email.charAt(0).toUpperCase();

            // 2. පැනල් එක මාරු කරනවා
            setTimeout(() => {
                document.getElementById("portalPanel").style.display = "none";
                document.getElementById("mainWrapper").classList.add("dashboard-mode");
                document.getElementById("dashPanel").classList.add("active");
                
                // 3. 3X-UI සර්වර් එකෙන් ඩේටා ඇදීම ආරම්භ කරනවා
                fetchDashboardData();
            }, 1000);
        }

        // 🌟 AllOrigins හරහා 3X-UI ඩේටා කියවන වැදගත්ම කොටස 🌟
        async function fetchDashboardData() {
    const email = document.getElementById("dashEmail").textContent.trim();
    
    // Loading පෙන්වීම
    document.getElementById("statUsed").innerText = "Loading...";

    // 1. Subscription URL එක
    const subUrl = `https://vpn.netrox.site:2096/sub/${email}`;
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(subUrl)}`;

    try {
        const response = await fetch(proxyUrl);
        const data = await response.json();
        
        // 🌟 මෙතන තමයි වැදගත්ම වෙනස! 
        // Header එකේ නැත්නම්, AllOrigins එකේ 'contents' වල ඇති කියලා බලනවා
        let profile = data.headers?.profile || data.headers?.Profile;
        
        // යම් හෙයකින් profile header එක නැත්නම්, AllOrigins එකෙන් ආපු Body එක (data.contents) භාවිතා කිරීම
        if (!profile && data.contents) {
            // සමහර විට සබ්ස්ක්‍රිප්ෂන් එකේ බොඩි එක ඇතුලේ තියෙන දේ මෙතනට ගන්න පුළුවන්
            console.log("Header හිස්, Body එකෙන් අගයන් සෙවීම...");
        }

        if (profile) {
            const params = new URLSearchParams(profile.replace(/;\s*/g, '&'));
            
            const upload = parseInt(params.get('upload') || 0);
            const download = parseInt(params.get('download') || 0);
            const totalLimit = parseInt(params.get('total') || 0);
            const expiry = parseInt(params.get('expire') || 0);

            const usedGB = ((upload + download) / (1024 ** 3)).toFixed(2);
            const daysLeft = Math.floor((expiry - (Math.floor(Date.now() / 1000))) / 86400);

            document.getElementById("statUsed").innerText = `${usedGB} GB`;
            document.getElementById("statExpires").innerText = expiry > 0 ? new Date(expiry * 1000).toLocaleDateString() : "No Limit";
            document.getElementById("statDays").innerText = expiry > 0 ? (daysLeft > 0 ? daysLeft : "Expired") : "∞";
            document.getElementById("statStatus").innerText = "Active";
            document.getElementById("statStatus").style.color = "var(--green)";
        } else {
            // දත්ත හොයාගන්න බැරි නම් දෙන පණිවිඩය
            document.getElementById("statUsed").innerText = "No Data";
        }

    } catch (err) {
        console.error("Fetch Error:", err);
        document.getElementById("statUsed").innerText = "Error";
    }
}

        function setErrors() {
            document.getElementById("statUsed").innerText = "Error";
            document.getElementById("statExpires").innerText = "Error";
            document.getElementById("statDays").innerText = "Error";
            document.getElementById("statStatus").innerText = "Offline";
            document.getElementById("statStatus").style.color = "var(--red)";
        }

        function handlePaidSubmit() {
            const user = document.getElementById("paidUser").value.trim();
            const pass = document.getElementById("paidPass").value.trim();
            const statusEl = document.getElementById("paidStatus");

            if(!user || !pass) {
                statusEl.className = "msg err";
                statusEl.textContent = "Username and Password are required.";
                return;
            }
            statusEl.className = "msg err";
            statusEl.textContent = "Authentication failed. Contact admin.";
        }

        function logout() {
            // ආපහු ලොගින් පැනල් එකට යනවා
            document.getElementById("dashPanel").classList.remove("active");
            document.getElementById("mainWrapper").classList.remove("dashboard-mode");
            document.getElementById("portalPanel").style.display = "block";
            document.getElementById("clientEmail").value = "";
            clr('clientStatus');
        }
    </script>
</body>
</html>
