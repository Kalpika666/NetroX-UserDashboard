<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetroX - Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #050510; color: white; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #333; color: white; border-radius: 8px; }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #00d2ff; color: black; }
        .btn-del { background: #ff3b30; color: white; padding: 5px 10px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #222; }
        .header { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NetroX Admin Panel</h1>
            <input type="password" id="adminKey" placeholder="Admin Key" style="width: 200px;">
        </div>

        <!-- Add New Client -->
        <div class="card">
            <h3><i class="fas fa-user-plus"></i> Add New Client</h3>
            <input type="text" id="newUsername" placeholder="Username (Unique)">
            <input type="text" id="newPassword" placeholder="Password">
            <input type="text" id="newName" placeholder="Full Name">
            <button class="btn-add" onclick="addClient()">Add Client</button>
        </div>

        <!-- Add VPN to Client -->
        <div class="card">
            <h3><i class="fas fa-shield-alt"></i> Link VPN to Client</h3>
            <input type="text" id="targetUser" placeholder="Client Username (e.g. Kalpika)">
            <input type="text" id="vpnLabel" placeholder="Label (e.g. Dialog Zoom)">
            <input type="text" id="vpnEmail" placeholder="X-UI Email ID">
            <textarea id="vpnConfig" placeholder="V2Ray Config Link (vless://...)"></textarea>
            <button class="btn-add" onclick="addVpn()">Link VPN</button>
        </div>

        <!-- Data List -->
        <div class="card">
            <h3><i class="fas fa-list"></i> Active VPNs</h3>
            <button onclick="fetchData()" style="background: #333; color: white;">Refresh List</button>
            <table id="vpnTable">
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Label</th>
                        <th>VPN Email</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        const workerUrl = "https://soft-water-567c.kalpikachampathi.workers.dev"; // ඔබේ Worker URL එක

        async function addClient() {
            const data = {
                username: document.getElementById('newUsername').value,
                password: document.getElementById('newPassword').value,
                full_name: document.getElementById('newName').value
            };
            const res = await fetch(`${workerUrl}/admin/add-client`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': document.getElementById('adminKey').value
                },
                body: JSON.stringify(data)
            });
            if(res.ok) alert("Client Added!"); else alert("Failed! Check Admin Key");
        }

        async function addVpn() {
            const data = {
                username: document.getElementById('targetUser').value,
                label: document.getElementById('vpnLabel').value,
                vpn_email: document.getElementById('vpnEmail').value,
                vpn_config: document.getElementById('vpnConfig').value
            };
            const res = await fetch(`${workerUrl}/admin/add-vpn`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': document.getElementById('adminKey').value
                },
                body: JSON.stringify(data)
            });
            if(res.ok) alert("VPN Linked!"); else alert("Failed!");
        }

        async function fetchData() {
            const res = await fetch(`${workerUrl}/admin/list`, {
                headers: { 'Authorization': document.getElementById('adminKey').value }
            });
            const data = await res.json();
            const tbody = document.querySelector("#vpnTable tbody");
            tbody.innerHTML = "";
            data.vpns.forEach(vpn => {
                tbody.innerHTML += `
                    <tr>
                        <td>${vpn.username}</td>
                        <td>${vpn.label}</td>
                        <td>${vpn.vpn_email}</td>
                        <td><button class="btn-del" onclick="deleteVpn(${vpn.id})">Delete</button></td>
                    </tr>
                `;
            });
        }

        async function deleteVpn(id) {
            if(!confirm("Are you sure?")) return;
            const res = await fetch(`${workerUrl}/admin/delete-vpn`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': document.getElementById('adminKey').value
                },
                body: JSON.stringify({ id })
            });
            fetchData();
        }
    </script>
</body>
</html>
